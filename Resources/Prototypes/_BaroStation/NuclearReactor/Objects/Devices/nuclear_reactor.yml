- type: entity
  id: NuclearReactor
  parent: BaseMachinePowered
  name: ядерный реактор
  description: Вырабатывает огромное количество энергии за счет распада урановых стержней. Требует контроля температуры.
  components:
  - type: Sprite
    sprite: _BaroStation/NuclearReactor/reactor.rsi
    layers:
    - state: reactor_off
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { state: reactor_on }
          False: { state: reactor_off }
  - type: NuclearReactor
    maxPowerOutput: 250000
  - type: PowerSupplier
    supplyRampRate: 50000
    supplyRampTolerance: 5000
  - type: Anchorable
  - type: Pullable
  - type: UserInterface
    interfaces:
      enum.NuclearReactorUiKey.Key:
        type: NuclearReactorBoundUserInterface
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound: /Audio/Effects/metalbreak.ogg
  - type: ActivatableUI
    key: enum.NuclearReactorUiKey.Key
    requireComplex: true
  - type: ActivatableUIRequiresPower
